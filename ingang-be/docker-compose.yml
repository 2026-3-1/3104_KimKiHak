services:
  postgres:
    image: postgres:16
    container_name: ingang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ingang
      POSTGRES_PASSWORD: ingangpw
      POSTGRES_DB: ingang
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
