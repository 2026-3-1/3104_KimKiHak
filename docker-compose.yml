services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ingang
      POSTGRES_PASSWORD: ingangpw
      POSTGRES_DB: ingang
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ingang"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./ingang-be
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://ingang:ingangpw@db:5432/ingang?schema=public
      JWT_SECRET: change-me-in-production
      ALLOWED_ORIGINS: http://localhost
      TOSS_SECRET_KEY: your-toss-secret-key
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./ingangFE
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
